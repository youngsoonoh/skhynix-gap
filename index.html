<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SK하이닉스 ADR 괴리율</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card { 
      background: white; border-radius: 24px; padding: 32px; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 400px; width: 100%;
    }
    h1 { font-size: 20px; margin-bottom: 24px; text-align: center; }
    .row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
    .label { color: #666; font-size: 14px; }
    .value { font-weight: 600; font-size: 15px; }
    .gap { font-size: 48px; font-weight: 700; text-align: center; margin: 24px 0; }
    .plus { color: #ff3b30; }
    .minus { color: #007aff; }
    .badge { background: #007aff; color: white; padding: 4px 12px; border-radius: 12px; font-size: 12px; }
    .time { text-align: center; color: #999; font-size: 12px; margin-top: 16px; }
    .loading { text-align: center; color: #999; padding: 40px 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>SK하이닉스 ADR 괴리율</h1>
    <div id="content" class="loading">로딩중...</div>
  </div>
  <script>
    async function load() {
      try {
        const res = await fetch('/api/price');
        const d = await res.json();
        const gapClass = parseFloat(d.gap) > 0 ? 'plus' : 'minus';
        const gapSign = parseFloat(d.gap) > 0 ? '+' : '';
        
        document.getElementById('content').innerHTML = `
          <div class="row">
            <span class="label">KRX 주가</span>
            <span class="value">${d.krPrice.toLocaleString()}원</span>
          </div>
          <div class="row">
            <span class="label">ADR</span>
            <span class="value">$${d.adrPrice} <span class="badge">${d.adrRatio}</span></span>
          </div>
          <div class="row">
            <span class="label">ADR 원화환산</span>
            <span class="value">${Math.round(d.adrKRW).toLocaleString()}원</span>
          </div>
          <div class="row">
            <span class="label">USD/KRW</span>
            <span class="value">${d.usdKrw}</span>
          </div>
          <div class="gap ${gapClass}">${gapSign}${d.gap}%</div>
          <div class="time">업데이트: ${new Date(d.updatedAt).toLocaleString('ko-KR')}</div>
        `;
      } catch(e) {
        document.getElementById('content').innerHTML = '<div class="loading">데이터 로드 실패 😢</div>';
      }
    }
    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
